name: Detection Rule CI

on:
  push:
    branches:
      - main
      - upgrade/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          for path in Path('rules').rglob('*.yml'):
              with path.open(encoding='utf-8') as handle:
                  document = yaml.safe_load(handle)
              if not isinstance(document, dict):
                  raise SystemExit(f'{path}: rule must be a mapping')
              print(f'validated {path}')
          PY

      - name: Run detection regression tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Upload synthetic fixtures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detection-rule-validation-fixtures
          path: |
            rules/
            sample-data/
          if-no-files-found: error
