title: Microsoft Defender Preference Changed Through PowerShell
id: 838ae181-d1be-4d4d-86a0-6d4eab75c386
status: experimental
description: Detects PowerShell process creation containing Defender preference modification cmdlets in synthetic Windows process data.
author: Dewald Pretorius
date: 2026-06-19
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    EventID: 4688
    NewProcessName|endswith: '\powershell.exe'
    CommandLine|contains_any:
      - 'Set-MpPreference'
      - 'Add-MpPreference'
      - 'Remove-MpPreference'
  condition: selection
falsepositives:
  - Approved security administration or endpoint-management automation
level: high
tags:
  - attack.defense_evasion
  - attack.t1562.001
