title: PowerShell Encoded Command Execution
id: 1e65b22e-c4e9-4af7-a38c-f28739180d65
status: experimental
description: Detects PowerShell processes launched with encoded-command arguments in synthetic Windows process-creation data.
author: Dewald Pretorius
date: 2026-06-19
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    EventID: 4688
    NewProcessName|endswith: '\powershell.exe'
    CommandLine|contains_any:
      - '-enc'
      - '-encodedcommand'
  condition: selection
falsepositives:
  - Approved administration or deployment tooling using encoded commands
level: high
tags:
  - attack.execution
  - attack.t1059.001
